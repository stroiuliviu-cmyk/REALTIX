<!doctype html>
<html lang="ro">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>REALTIX — Găsește, evaluează, vinde — ușor.</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Montserrat:wght@700&display=swap');
      body { padding: 0; margin: 0; font-family: 'Inter', sans-serif; }
      .font-montserrat { font-family: 'Montserrat', sans-serif; }
      @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
      function LandingPage() {
        // Starea pentru afișarea modalului de logare
        const [showLogin, setShowLogin] = React.useState(false);

        // Funcția de logare (redirecționează către platformă)
        const handleLogin = (e) => {
          e.preventDefault(); 
          // Redirecționare către fișierul platformei:
          window.location.href = 'dashboard.html';
        };

        const features = [
          { title: 'Sistem CRM', desc: 'Gestionează clienții și tranzacțiile într-un singur loc.', icon: '👥' },
          { title: 'Agregator Anunțuri', desc: 'Colectare automată de pe 999.md, imobiliare.md și altele.', icon: '📊' },
          { title: 'Asistent AI', desc: 'Generare automată de descrieri și evaluare inteligentă a proprietăților.', icon: '🤖' },
          { title: 'Contracte PDF', desc: 'Generare automată a contractelor și documentelor necesare.', icon: '📄' },
        ];

        const targetAudience = [
          { role: 'Agenții Imobiliare', desc: 'Automatizarea proceselor și managementul echipei.' },
          { role: 'Agenți Independenți', desc: 'Gestionarea eficientă a portofoliului de clienți.' },
          { role: 'Investitori', desc: 'Analiza pieței și a activelor în timp real.' },
          { role: 'Cumpărători / Chiriași', desc: 'Acces la anunțuri verificate direct de la proprietari.' },
        ];

        const pricing = [
          { name: 'Starter', price: '12€', users: '1 agent', features: ['CRM de bază', 'Asistent AI limitat', 'Suport email'] },
          { name: 'Medium', price: '49€', users: '2–5 agenți', features: ['CRM avansat', 'Agregator anunțuri', 'Generare PDF', 'Suport prioritar'], popular: true },
          { name: 'Pro', price: '89€', users: 'Nelimitat agenți', features: ['Toate funcțiile Medium', 'White-label / branding', 'API & Integrări personalizate', 'Manager dedicat'] },
        ];

        return (
          <div className="min-h-screen bg-gradient-to-br from-slate-50 via-white to-blue-50 text-slate-900 relative">
            
            {/* MODAL DE AUTENTIFICARE */}
            {showLogin && (
              <div className="fixed inset-0 z-[100] flex items-center justify-center bg-slate-900/60 backdrop-blur-sm px-4">
                <div className="w-full max-w-md rounded-[2rem] bg-white p-8 shadow-2xl relative animate-[fadeIn_0.2s_ease-out]">
                  <button 
                    onClick={() => setShowLogin(false)}
                    className="absolute top-5 right-6 text-slate-400 hover:text-slate-900 text-3xl font-light"
                  >
                    ×
                  </button>
                  
                  <div className="text-2xl font-montserrat font-bold text-[#1E3A8A] tracking-widest text-center mb-1">
                    REALTIX
                  </div>
                  <h3 className="text-xl font-bold text-center text-slate-900 mb-8">Acces platformă</h3>
                  
                  <form onSubmit={handleLogin} className="space-y-5">
                    <div>
                      <label className="block text-sm font-semibold text-slate-700 mb-1.5">Email</label>
                      <input 
                        type="email" 
                        required
                        defaultValue="agent@realtix.md"
                        className="w-full rounded-xl border border-slate-200 bg-slate-50 px-4 py-3 focus:border-[#1E3A8A] focus:bg-white focus:outline-none focus:ring-1 focus:ring-[#1E3A8A] transition-colors" 
                        placeholder="nume@agentie.md" 
                      />
                    </div>
                    <div>
                      <label className="block text-sm font-semibold text-slate-700 mb-1.5">Parolă</label>
                      <input 
                        type="password" 
                        required
                        defaultValue="123456"
                        className="w-full rounded-xl border border-slate-200 bg-slate-50 px-4 py-3 focus:border-[#1E3A8A] focus:bg-white focus:outline-none focus:ring-1 focus:ring-[#1E3A8A] transition-colors" 
                        placeholder="••••••••" 
                      />
                    </div>
                    
                    <div className="flex items-center justify-between pt-2">
                      <label className="flex items-center gap-2 text-sm text-slate-600 cursor-pointer">
                        <input type="checkbox" className="rounded border-slate-300 text-[#1E3A8A]" defaultChecked />
                        Ține-mă minte
                      </label>
                      <a href="#" className="text-sm font-semibold text-[#1E3A8A] hover:underline">Ai uitat parola?</a>
                    </div>

                    <button 
                      type="submit" 
                      className="mt-6 w-full rounded-xl bg-[#1E3A8A] px-4 py-3.5 font-bold text-white shadow-lg hover:bg-blue-900 hover:shadow-xl transition-all"
                    >
                      Intră în cont
                    </button>
                  </form>
                </div>
              </div>
            )}

            {/* Header / Navigare */}
            <header className="fixed top-0 w-full z-50 border-b border-slate-200/80 bg-white/90 backdrop-blur-xl transition-all">
              <div className="mx-auto flex max-w-7xl items-center justify-between px-6 py-4">
                <div className="text-3xl font-montserrat font-bold text-[#1E3A8A] tracking-widest">
                  REALTIX
                </div>
                
                <nav className="hidden md:flex gap-8 text-sm font-medium text-slate-600">
                  <a href="#functionalitati" className="hover:text-[#1E3A8A] transition-colors">Funcționalități</a>
                  <a href="#audienta" className="hover:text-[#1E3A8A] transition-colors">Pentru Cine</a>
                  <a href="#preturi" className="hover:text-[#1E3A8A] transition-colors">Prețuri</a>
                </nav>

                <div className="flex gap-4 items-center">
                  <button 
                    onClick={() => setShowLogin(true)}
                    className="hidden sm:block text-sm font-semibold text-[#1E3A8A] hover:text-blue-900 transition-colors"
                  >
                    Autentificare
                  </button>
                  <button 
                    onClick={() => setShowLogin(true)}
                    className="rounded-full bg-[#1E3A8A] hover:bg-blue-900 transition-colors px-6 py-2.5 text-white text-sm font-semibold shadow-lg"
                  >
                    Încearcă Gratuit
                  </button>
                </div>
              </div>
            </header>

            {/* Hero Section */}
            <section className="relative pt-32 pb-20 lg:pt-48 lg:pb-32 overflow-hidden">
              <div className="mx-auto max-w-7xl px-6 text-center">
                <div className="inline-flex items-center gap-2 rounded-full border border-blue-200 bg-blue-50 px-4 py-2 text-sm text-[#1E3A8A] mb-8">
                  <span className="flex h-2 w-2 rounded-full bg-[#22C55E]"></span>
                  SaaS PropTech pregătit de scalare în Moldova
                </div>
                <h1 className="mx-auto max-w-4xl text-5xl font-montserrat font-bold tracking-tight text-slate-900 sm:text-7xl">
                  Găsește, evaluează, vinde — <span className="text-[#1E3A8A]">ușor.</span>
                </h1>
                <p className="mx-auto mt-6 max-w-2xl text-lg text-slate-600 leading-relaxed">
                  REALTIX combină funcțiile unui sistem CRM, agregator de căutare și asistent AI pentru a face lucrul cu imobiliarele simplu, inteligent și transparent.
                </p>
                <div className="mt-10 flex flex-col sm:flex-row justify-center gap-4">
                  <button 
                    onClick={() => setShowLogin(true)}
                    className="rounded-full bg-[#1E3A8A] px-8 py-4 text-base font-semibold text-white shadow-xl hover:bg-blue-900 transition-all"
                  >
                    Creează cont de agent
                  </button>
                  <a href="#functionalitati" className="rounded-full bg-white border border-slate-200 px-8 py-4 text-base font-semibold text-slate-900 shadow-sm hover:bg-slate-50 transition-all inline-flex items-center justify-center">
                    Vezi Demo Platformă
                  </a>
                </div>
              </div>
            </section>

            {/* Funcționalități */}
            <section id="functionalitati" className="py-20 bg-white">
              <div className="mx-auto max-w-7xl px-6">
                <div className="text-center mb-16">
                  <h2 className="text-3xl font-montserrat font-bold text-slate-900">Instrumentele viitorului imobiliar</h2>
                  <p className="mt-4 text-slate-600">Automatizează tranzacțiile și folosește inteligența artificială.</p>
                </div>
                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8">
                  {features.map((feat, idx) => (
                    <div key={idx} className="rounded-[2rem] bg-slate-50 p-8 border border-slate-100 hover:shadow-xl transition-shadow">
                      <div className="text-4xl mb-4">{feat.icon}</div>
                      <h3 className="text-xl font-bold text-slate-900 mb-2">{feat.title}</h3>
                      <p className="text-slate-600 text-sm leading-relaxed">{feat.desc}</p>
                    </div>
                  ))}
                </div>
              </div>
            </section>

            {/* Public Țintă */}
            <section id="audienta" className="py-20 bg-gradient-to-br from-[#1E3A8A] to-blue-900 text-white">
              <div className="mx-auto max-w-7xl px-6">
                <div className="grid grid-cols-1 lg:grid-cols-2 gap-16 items-center">
                  <div>
                    <h2 className="text-3xl md:text-4xl font-montserrat font-bold mb-6">Un ecosistem complet pentru toți actorii pieței</h2>
                    <p className="text-blue-200 text-lg mb-8 leading-relaxed">
                      Fie că ești o agenție mare cu zeci de angajați sau un cumpărător în căutarea locuinței perfecte, REALTIX filtrează, organizează și automatizează informația pentru tine.
                    </p>
                    <ul className="space-y-4">
                      <li className="flex items-center gap-3">
                        <span className="text-[#22C55E]">✔</span> Filtru „doar de la proprietari”
                      </li>
                      <li className="flex items-center gap-3">
                        <span className="text-[#22C55E]">✔</span> Multilingv (RO / RU / EN)
                      </li>
                      <li className="flex items-center gap-3">
                        <span className="text-[#22C55E]">✔</span> Aplicație mobilă integrată
                      </li>
                    </ul>
                  </div>
                  <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    {targetAudience.map((item, idx) => (
                      <div key={idx} className="bg-white/10 backdrop-blur-md border border-white/20 p-6 rounded-3xl">
                        <h4 className="font-bold text-lg mb-2">{item.role}</h4>
                        <p className="text-sm text-blue-100">{item.desc}</p>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            </section>

            {/* Prețuri */}
            <section id="preturi" className="py-24 bg-slate-50">
              <div className="mx-auto max-w-7xl px-6">
                <div className="text-center mb-16">
                  <h2 className="text-3xl font-montserrat font-bold text-slate-900">Abonamente transparente</h2>
                  <p className="mt-4 text-slate-600">Alege planul potrivit pentru volumul tău de muncă.</p>
                </div>
                <div className="grid grid-cols-1 md:grid-cols-3 gap-8 max-w-5xl mx-auto">
                  {pricing.map((plan, idx) => (
                    <div key={idx} className={`relative rounded-[2rem] p-8 border ${plan.popular ? 'bg-[#1E3A8A] text-white border-[#1E3A8A] shadow-2xl scale-105' : 'bg-white text-slate-900 border-slate-200 shadow-lg'}`}>
                      {plan.popular && (
                        <div className="absolute top-0 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-[#22C55E] text-white px-4 py-1 rounded-full text-xs font-bold uppercase tracking-wide">
                          Cel mai ales
                        </div>
                      )}
                      <h3 className="text-xl font-bold mb-2">{plan.name}</h3>
                      <div className="mb-6">
                        <span className="text-4xl font-montserrat font-bold">{plan.price}</span>
                        <span className={`text-sm ${plan.popular ? 'text-blue-200' : 'text-slate-500'}`}> / lună</span>
                      </div>
                      <div className={`inline-block px-3 py-1 rounded-full text-xs font-semibold mb-8 ${plan.popular ? 'bg-white/20' : 'bg-slate-100'}`}>
                        {plan.users}
                      </div>
                      <ul className="space-y-4 mb-8">
                        {plan.features.map((f, i) => (
                          <li key={i} className="flex items-center gap-3 text-sm">
                            <span className={plan.popular ? 'text-[#22C55E]' : 'text-[#1E3A8A]'}>✔</span> {f}
                          </li>
                        ))}
                      </ul>
                      <button 
                        onClick={() => setShowLogin(true)}
                        className={`w-full py-3 rounded-2xl font-semibold transition-colors ${plan.popular ? 'bg-[#22C55E] text-white hover:bg-green-600' : 'bg-slate-100 text-slate-900 hover:bg-slate-200'}`}
                      >
                        Alege {plan.name}
                      </button>
                    </div>
                  ))}
                </div>
              </div>
            </section>

            {/* Footer */}
            <footer className="bg-slate-900 text-slate-400 py-12 text-center text-sm">
              <div className="mx-auto max-w-7xl px-6 flex flex-col md:flex-row justify-between items-center gap-4">
                <div className="text-2xl font-montserrat font-bold text-white tracking-widest">REALTIX</div>
                <p>© 2026 REALTIX. Toate drepturile rezervate.</p>
                <div className="flex gap-4">
                  <a href="#" className="hover:text-white transition-colors">Termeni și Condiții</a>
                  <a href="#" className="hover:text-white transition-colors">Confidențialitate</a>
                </div>
              </div>
            </footer>
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<LandingPage />);
    </script>
  </body>
</html>
